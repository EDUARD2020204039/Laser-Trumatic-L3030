version: "3.9"

services:
  lasertrumaticl3030:
    image: ghcr.io/unraidg5/lasertrumaticl3030:latest
    container_name: lasertrumaticl3030
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      LASER_DATA_DIR: /data
      BACKGROUND_SYNC_ENABLED: "1"
      BACKGROUND_SYNC_INTERVAL_SECONDS: "3"
      REQUEST_LIVE_SYNC_ENABLED: "0"
      SAVED_RECORDS_PROMETHEUS_ENABLED: "1"
      PROMETHEUS_BASE_URL: "http://192.168.2.23:9090"
      PROMETHEUS_QUERY_TIMEOUT_SECONDS: "10"
      LASER1_REAL_DATA_ENDPOINT: "http://192.168.2.242:8081/"
      LASER1MODBUS_REAL_DATA_ENDPOINT: "http://192.168.2.242:8081/"
      LASER2MODBUS_REAL_DATA_ENDPOINT: "http://192.168.2.138:8081/"
      LASER1_REAL_DATA_ENDPOINT_FALLBACK: "https://laserb.habaresearch.eu/"
      LASER1MODBUS_REAL_DATA_ENDPOINT_FALLBACK: "https://laserb.habaresearch.eu/"
      LASER1_HMI_FEED_URL: "http://192.168.2.242:8081/"
      LASER1MODBUS_HMI_FEED_URL: "http://192.168.2.242:8081/"
      LASER2MODBUS_HMI_FEED_URL: "http://192.168.2.138:8081/"
      LASER2MODBUS_MODBUS_HOST: "192.168.2.138"
      LASER2MODBUS_MODBUS_PORT: "502"
      LASER2MODBUS_MODBUS_UNIT_ID: "1"
      LASER2MODBUS_MODBUS_BIT_SOURCE: "discrete_input"
      LASER2MODBUS_MODBUS_START_ADDRESS: "0"
      LASER2MODBUS_MODBUS_IN1_SIGNAL: "machine_on"
      LASER2MODBUS_MODBUS_IN2_SIGNAL: "table_change"
      LASER2MODBUS_MODBUS_IN3_SIGNAL: "cutting_active"
      LASER2MODBUS_MODBUS_IN4_SIGNAL: "idle_abort"
      PONTAJ_LASER2MODBUS_WORKCENTER_ID: "1"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_IDS: "${TELEGRAM_CHAT_IDS:-}"
      TELEGRAM_ALLOWED_CHAT_IDS: "${TELEGRAM_ALLOWED_CHAT_IDS:-}"
      TELEGRAM_COMMANDS_ENABLED: "${TELEGRAM_COMMANDS_ENABLED:-1}"
      TELEGRAM_REPORT_TIME: "${TELEGRAM_REPORT_TIME:-23:30}"
      TELEGRAM_REPORT_MACHINE_KEYS: "${TELEGRAM_REPORT_MACHINE_KEYS:-laser1modbus,laser2modbus}"
      TELEGRAM_REPORT_TOP_LIMIT: "${TELEGRAM_REPORT_TOP_LIMIT:-10}"
      TELEGRAM_DOSAR_LOOKBACK_DAYS: "${TELEGRAM_DOSAR_LOOKBACK_DAYS:-730}"
      TELEGRAM_TABLE_CHANGE_FREE_SECONDS: "${TELEGRAM_TABLE_CHANGE_FREE_SECONDS:-90}"
      # Lasa configurarea Modbus in dashboard (Host/IP, Unit ID, mapare IN1..IN4).
      # Pentru Laser2Modbus default-ul este 192.168.2.138:502; portul trebuie deschis pe PC-ul utilajului.
    volumes:
      - lasertrumaticl3030_data:/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: lasertrumaticl3030_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - lasertrumaticl3030

volumes:
  lasertrumaticl3030_data:
    name: lasertrumaticl3030_data
