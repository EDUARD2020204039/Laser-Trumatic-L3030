version: "3.9"

services:
  lasertrumaticl3030:
    image: ghcr.io/unraidg5/lasertrumaticl3030:latest
    container_name: lasertrumaticl3030
    restart: unless-stopped
    ports:
      - "3030:3030"
    environment:
      LASER_DATA_DIR: /data
      BACKGROUND_SYNC_ENABLED: "1"
      BACKGROUND_SYNC_INTERVAL_SECONDS: "3"
      REQUEST_LIVE_SYNC_ENABLED: "0"
      SAVED_RECORDS_PROMETHEUS_ENABLED: "1"
      PROMETHEUS_BASE_URL: "http://192.168.2.23:9090"
      PROMETHEUS_QUERY_TIMEOUT_SECONDS: "10"
      LASER1_REAL_DATA_ENDPOINT: "http://192.168.2.242:8081/"
      LASER1MODBUS_REAL_DATA_ENDPOINT: "http://192.168.2.242:8081/"
      LASER1_REAL_DATA_ENDPOINT_FALLBACK: "https://laserb.habaresearch.eu/"
      LASER1MODBUS_REAL_DATA_ENDPOINT_FALLBACK: "https://laserb.habaresearch.eu/"
      LASER1_HMI_FEED_URL: "http://192.168.2.242:8081/"
      LASER1MODBUS_HMI_FEED_URL: "http://192.168.2.242:8081/"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_IDS: "${TELEGRAM_CHAT_IDS:-}"
      TELEGRAM_ALLOWED_CHAT_IDS: "${TELEGRAM_ALLOWED_CHAT_IDS:-}"
      TELEGRAM_COMMANDS_ENABLED: "${TELEGRAM_COMMANDS_ENABLED:-1}"
      TELEGRAM_REPORT_TIME: "${TELEGRAM_REPORT_TIME:-23:30}"
      TELEGRAM_REPORT_MACHINE_KEYS: "${TELEGRAM_REPORT_MACHINE_KEYS:-laser1modbus}"
      TELEGRAM_REPORT_TOP_LIMIT: "${TELEGRAM_REPORT_TOP_LIMIT:-10}"
      TELEGRAM_DOSAR_LOOKBACK_DAYS: "${TELEGRAM_DOSAR_LOOKBACK_DAYS:-730}"
      # Completeaza restul variabilelor necesare pentru feed-uri / SQL / camere.
    volumes:
      - lasertrumaticl3030_data:/data
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup lasertrumaticl3030

volumes:
  lasertrumaticl3030_data:
    name: lasertrumaticl3030_data
